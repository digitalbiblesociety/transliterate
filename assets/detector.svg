<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 75" width="750" height="75" role="img" aria-label="Letters from Devanagari, Tamil, Bengali, and Kannada scripts pass through a metal-detector scanner and emerge as Latin transliterations.">
<title>transliterate — scripts pass through and emerge Romanized</title>

<defs>
  <radialGradient id="flash">
    <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
    <stop offset=".25" stop-color="#fff7c4" stop-opacity=".95"/>
    <stop offset=".55" stop-color="#ffea00" stop-opacity=".55"/>
    <stop offset="1" stop-color="#ffea00" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.4"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sglow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation=".7"/>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- background plate -->

<line x1="0" y1="68" x2="750" y2="68" stroke="#666" stroke-width=".5" opacity=".7"/>

<!-- direction marks: inbound -->
<g fill="#666" opacity=".55">
  <path d="M 250 40 l -4 -3 l 0 6 z"/>
  <path d="M 270 40 l -4 -3 l 0 6 z"/>
  <path d="M 290 40 l -4 -3 l 0 6 z"/>
  <path d="M 480 40 l 4 -3 l 0 6 z"/>
  <path d="M 500 40 l 4 -3 l 0 6 z"/>
  <path d="M 520 40 l 4 -3 l 0 6 z"/>
</g>

<!-- ======== word pairs (rendered behind scanner frame) ======== -->

<!-- Pair 1: नमस्ते -> namastē -->
<text y="48" font-size="28" fill="#dde6ff" filter="url(#glow)" text-anchor="end" font-family="system-ui,'Noto Sans Devanagari','Mangal',sans-serif" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;.025;.125;.142;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="170;170;340;340;340" keyTimes="0;.025;.125;.142;1" dur="12s" repeatCount="indefinite"/>नमस्ते</text>
<text y="47" font-size="24" fill="#7ad" filter="url(#glow)" text-anchor="start" font-family="ui-monospace,'SF Mono','Menlo','Consolas',monospace" font-weight="500" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.142;.158;.225;.25;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="410;410;410;580;700;700" keyTimes="0;.142;.158;.225;.25;1" dur="12s" repeatCount="indefinite"/>namastē</text>

<!-- Pair 2: வணக்கம் -> vaṇakkam -->
<text y="48" font-size="28" fill="#dde6ff" filter="url(#glow)" text-anchor="end" font-family="system-ui,'Noto Sans Tamil','Latha',sans-serif" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.25;.275;.375;.392;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="170;170;170;340;340;340" keyTimes="0;.25;.275;.375;.392;1" dur="12s" repeatCount="indefinite"/>வணக்கம்</text>
<text y="47" font-size="24" fill="#26b" filter="url(#glow)" text-anchor="start" font-family="ui-monospace,'SF Mono','Menlo','Consolas',monospace" font-weight="500" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.392;.408;.475;.5;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="410;410;410;580;700;700" keyTimes="0;.392;.408;.475;.5;1" dur="12s" repeatCount="indefinite"/>vaṇakkam</text>

<!-- Pair 3: নমস্কার -> namaskār -->
<text y="48" font-size="28" fill="#dde6ff" filter="url(#glow)" text-anchor="end" font-family="system-ui,'Noto Sans Bengali','Vrinda',sans-serif" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.5;.525;.625;.642;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="170;170;170;340;340;340" keyTimes="0;.5;.525;.625;.642;1" dur="12s" repeatCount="indefinite"/>নমস্কার</text>
<text y="47" font-size="24" fill="#48b" filter="url(#glow)" text-anchor="start" font-family="ui-monospace,'SF Mono','Menlo','Consolas',monospace" font-weight="500" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.642;.658;.725;.75;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="410;410;410;580;700;700" keyTimes="0;.642;.658;.725;.75;1" dur="12s" repeatCount="indefinite"/>namaskār</text>

<!-- Pair 4: ಸ್ವಾಗತ -> svāgata -->
<text y="48" font-size="28" fill="#dde6ff" filter="url(#glow)" text-anchor="end" font-family="system-ui,'Noto Sans Kannada','Tunga',sans-serif" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.75;.775;.875;.892;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="170;170;170;340;340;340" keyTimes="0;.75;.775;.875;.892;1" dur="12s" repeatCount="indefinite"/>ಸ್ವಾಗತ</text>
<text y="47" font-size="24" fill="#9bd" filter="url(#glow)" text-anchor="start" font-family="ui-monospace,'SF Mono','Menlo','Consolas',monospace" font-weight="500" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.892;.908;.975;1" dur="12s" repeatCount="indefinite"/><animate attributeName="x" values="410;410;410;580;700" keyTimes="0;.892;.908;.975;1" dur="12s" repeatCount="indefinite"/>svāgata</text>

<!-- ======== scanner frame (drawn over text so posts occlude as it enters) ======== -->
<rect x="345" y="12" width="5" height="55" fill="url(#post)" rx="1.5"/>
<rect x="400" y="12" width="5" height="55" fill="url(#post)" rx="1.5"/>
<rect x="345" y="12" width="60" height="6" fill="url(#post)" rx="1.5"/>

<!-- LEDs -->
<circle cx="355" cy="15" r="1.1" fill="#acd" filter="url(#sglow)"><animate attributeName="opacity" values=".4;1;.4" dur="1.7s" repeatCount="indefinite"/></circle>
<circle cx="375" cy="15" r="1.1" fill="#48b" filter="url(#sglow)"><animate attributeName="opacity" values=".25;.25;1;.25;.25;1;.25;.25;1;.25;.25;1;.25" keyTimes="0;.13;.142;.17;.38;.392;.42;.63;.642;.67;.88;.892;1" dur="12s" repeatCount="indefinite"/></circle>
<circle cx="395" cy="15" r="1.1" fill="#26b" filter="url(#sglow)"><animate attributeName="opacity" values=".4;1;.4" dur="1.1s" repeatCount="indefinite"/></circle>

<!-- vertical scan beam -->
<line x1="375" y1="20" x2="375" y2="67" stroke="#cde" stroke-width=".7" opacity=".5" stroke-dasharray="3 2">
  <animate attributeName="opacity" values=".3;.7;.3" dur="1.5s" repeatCount="indefinite"/>
  <animate attributeName="stroke-dashoffset" from="0" to="-10" dur=".6s" repeatCount="indefinite"/>
</line>

<!-- horizontal sweep -->
<line x1="350" y1="20" x2="400" y2="20" stroke="#cde" stroke-width=".5" opacity="0">
  <animate attributeName="opacity" values="0;.5;0" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="y1" values="20;65;20" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="y2" values="20;65;20" dur="2s" repeatCount="indefinite"/>
</line>

<!-- flash burst (drawn last, over everything, peaks 4× per cycle) -->
<circle cx="375" cy="42" r="0" fill="url(#flash)">
  <animate attributeName="r" values="0;0;42;0;0;42;0;0;42;0;0;42;0;0" keyTimes="0;.129;.142;.155;.379;.392;.405;.629;.642;.655;.879;.892;.905;1" dur="12s" repeatCount="indefinite"/>
</circle>

</svg>
